<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>User Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #ffffff;
      width: 400px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #2b2b45;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #5a67d8;
      box-shadow: 0 0 5px rgba(90,103,216,0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #5a67d8, #7f9cf5);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(90,103,216,0.4);
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2>Tambah User</h2>

    <form action="http://192.168.0.121:8080/users" method="post" enctype="multipart/form-data">
      <input type="text" name="name" placeholder="Nama Lengkap" required>
      <input type="email" name="email" placeholder="Email Aktif" required>
      <input type="file" name="photo" required>
      <button type="submit">Upload User</button>
    </form>

    <div class="footer">
      Microservice Project • PostgreSQL + MinIO
    </div>
  </div>

</body>
</html>
